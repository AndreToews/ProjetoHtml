

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }


        /* Cabeçalho Principal */
        h1{
            font-size: 2.5rem;
            color: #5d7bff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        h2{
            font-size: 1.8rem;
            color: #5d7bff;
            margin: 20px;
            text-transform: uppercase;
        }
        ol, ul, dl{
            margin: 0;
            padding: 0;
            list-style-position: inside;
            width: 100%;
            max-width: 600px;
        /* 16px = 1rem */
        }
        ol li, ul li{
            background-color: #ffffff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        ol li:hover, ul li:hover{
            transform: translate(-5px);
            background-color: #5c4fd8;
            color: #ffffff;          
        }


        /* Lista de Definição */
        dl dt{
            font-weight: bold;
            color: #6f87f0;
            margin-top: 20px;
        }


    </style>
</head>
<body>
    <h1>Listas</h1>


    <!-- Lista não Ordenada -->
     <h2>Aprovados</h2>
     <ol>
        <li>André</li>
        <li>Guilherme</li>
        <li>Pedro</li>
        <li>Gabriel</li>
     </ol>


     <!-- Lista não Ordenada -->
      <ul>
        <li>Queijo</li>
        <li>Leite</li>
        <li>Arroz</li>
        <li>Pão</li>
      </ul>


      <!-- Lista de Definição -->
       <h2>Principais termos do glossário de Cloud Computing</h2>
       <dl>
            <dt>BaaS</dt>
            <dd>Backend como Serviço</dd>
            <dt>Iaas</dt>
            <dd>Infraestrutura como Serviço</dd>
            <dt>PaaS</dt> <!-- Titulo -->
            <dd>Plataforma como Serviço</dd><!-- Descrição -->
            <dt>SaaS</dt>
            <dd>Software como Serviço</dd>
       </dl>
</body>
</html>
