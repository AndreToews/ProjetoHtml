<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        /* Estilo Geral da Tabela */
        table{
            width: 80%;
            margin: 50px auto;
            border-collapse: collapse;
            box-shadow: 0 4px 6px rgba(0, 100, 255, 0.5);
            border-radius: 12px;
        }
        caption{
            font-size: 1.8rem; /*= 32px*/
            font-weight: bold;
            color: #239fec;
            margin-bottom: 20px;
        }
        th, td{
            font-size: 1rem;
            padding: 20px;
            text-align: left;
            border-bottom: 1px  solid #638eeb;
        }
        th{
            background-color: #638eeb;
            color: #fff;
            text-transform: uppercase;
        }
        thead tr{
            border-bottom: 3px solid #00438a;
        }
        tbody tr:hover{
            background-color: #7270f1;
        }


    </style>
</head>
<body>
    <table>
        <caption>Produtos</caption>
        <thead>
            <tr> <!-- linhas -->
                <th>Produtos</th><!-- Colunas -->
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ipad</td> <!-- th é para o header e td para o body -->
                <td>R$ 3289,00</td>
                <td>5</td>
                <td>R$ 16.455,00</td>
            </tr>
            <tr>
                <td>Samsung S26</td>
                <td>R$ 5.500,00</td>
                <td>3</td>
                <td>R$ 16.5000,00</td>
            </tr>
        </tbody>
        <tfoot>
            <td colspan="3">Total</td>
            <td>R$ 32.955,00</td>
        </tfoot>
    </table>
</body>
</html>
