<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags de Texto 01</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f8ff;
            color: #004f4f;
            line-height: 1.10;
            margin: 0px;
            padding: 10px;
        }
        h1,h2,h3,h4,h5,h6{
            color: #00ced1;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 1px 1px 5px rgba(0,206,209,0.5);/*Sombra suave ciano*/
                       
            h1{
                font-size: 3rem;
                text-transform: uppercase;
                letter-spacing: 2px;
            }
            h2{
                font-size: 2.5rem;
                text-transform: uppercase;
                letter-spacing: 1.5px;
            }
            h3{
                font-size: 2rem;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            h4{
                font-size: 1.75rem;
                text-transform: uppercase;
            }
            h5{
                font-size: 1.5rem;
            }
            h6{font-size: 1.25;
            font-weight: 900;
            color: #007a99;
            }
           
        }
        /* estilos para parágrafos */
        p{
            font-size: 1rem;
            color: #004f4f;
            margin: 15px 0;
        }


        /* Negrito e Itálico */
        b{
            font-weight: bold;
            color: #008b8b; /*Ciano mais escuro*/
        }
        i{
            font-style: italic;
            color: #20b2aa; /*Ciano mais claro*/
        }
        /* sobrescrito e subscrito */
        sup{
            font-size: 0.8rem;
            color: #00ced1;
        }
        sub{
            font: size 0.8rem;
            color: #00ced1;
        }


        p{
            word-spacing: 5px;/*Aumenta o espaçamento entre palavras*/
        }
       
    </style>
</head>
<body>
    <!-- Cabeçalho -->
    <h1>Cabeçalho Principal</h1>
    <h2>Cabeçalho de Nível 2</h2>    
    <h3>Cabeçalho de Nível 3</h3>    
    <h4>Cabeçalho de Nível 4</h4>    
    <h5>Cabeçalho de Nível 5</h5>    
    <h6>Cabeçalho de Nível 6</h6>
   
    <!-- Parágrafo -->
     <p>Lorem ipsum dolor sit amet.</p>




     <!-- Negrito e itálico -->
     <p>Texto em <b>negrito</b> e <i>itálico</i>.</p>




     <!-- Sibrescrito e subscrito -->
     <p>2<sup>2</sup> = 4 e H<sub>2</sub>O = Água!</p>




     <!-- Espaço em branco -->
      <p>Espaço    entre    palavras</p>
</body>
</html>
